  <body>
    <script>
      // Receives SPA redirects from 404.html and replaces the URL back.
      (function () {
        var l = window.location;
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function (v) {
            var i = v.indexOf('=');
            if (i > 0) q[v.slice(0, i)] = v.slice(i + 1).replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? '?' + q.q : '') + l.hash
            );
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
