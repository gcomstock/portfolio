<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Spinner</title>

<script src="http://www.pandora.com/static/ads/javascript/jQuery/jquery-latest.js"></script>
<!-- <script type="text/javascript" src="google.fastbutton.js"></script>
<script type="text/javascript" src="jquery.google.fastbutton.js"></script> -->

<link href='http://fonts.googleapis.com/css?family=Open+Sans+Condensed:700' rel='stylesheet' type='text/css'>

<style>

<!-- BODY {background:none transparent;}-->

</style>

<link type="text/css" href="style.css" rel="stylesheet" media="screen"/>

<script>


stations = { "list": [

  {
    "stationName": "beach",
    "stationId": "1451028206434216199"
  },

  {
    "stationName": "party",
    "stationId": "1451032385437395207"
  },

  {
    "stationName": "bbq",
    "stationId": "1451055200303671559"
  }//no comma for last node

]};



$(document).ready(function() {


$('body').on('touchmove', function(event) {
  event.preventDefault();
}, false);


	revolutions = 10
	baseSpin = revolutions * 360
	spinSelections = 3 //60, 90, 120


	spinRemainder = 0
	finalSpin = 0


	$('#spinner').on('touchstart mousedown', function(e){    //.fastClick(function() {

		if ( $(this).hasClass('nowSpinning') )
			return false;


		if ( !$(this).hasClass('spinning') ) {

			$('#tapToSpin').css({
				'webkitAnimation' : 'tapToSpinAway 800ms ease-in-out',
				'webkitAnimationFillMode': 'forwards'
			});

			$('#spinner').css({
				'webkitAnimation' : 'none', //remove tap animation
				'webkitTransform': 'scale(0.8) translate3d(0, 0, 0) rotate(0deg)'
			});

			$('#bg, #star, #title').addClass('animate1');


			setTimeout(function(){
				$('#spinner').addClass('spinning');
			},800);

			setTimeout(function(){
				animateSpinner();
			},1000);

		}
		else {
			animateSpinner();
		}

	});
	
});



function animateSpinner() {

		$('#launch, #spinAgain').removeClass('animate1');
		$('.bg').removeClass('fade stay');

		$('#spinner').addClass('nowSpinning');

		$('#spinner .needle').css({
			'webkitAnimationName' : 'needleFade',
			'animationName' : 'needleFade'
		});

		$('#spinner .needleBlur').css({
			'webkitAnimationName' : 'blurFade',
			'animationName' : 'blurFade'
		});

		//0-2
		thisRoll = Math.floor(Math.random() * spinSelections)



		finalSpin = baseSpin + 30 + (thisRoll+1)*40 + spinRemainder

		spinRemainder = 360 - finalSpin%360;

		console.log('thisRoll: '+thisRoll+' finalSpin: '+finalSpin+' spinRemainder: '+spinRemainder);
		console.log('basepsin:'+baseSpin);
		
		$('#spinner').css({
			'-webkit-transform':'scale(0.8) translate3d(0, 0, 0) rotate('+finalSpin+'deg)'
		});
		
		baseSpin = revolutions * 360 + finalSpin



		setTimeout(function(){
			$('#spinner .needle, #spinner .needleBlur').css({
				'webkitAnimationName' : '',
				'animationName' : ''
			});

			$('#launch').html('<a class="stationBtn" href="#" onclick="PandoraApp.createStationFromStationId(\''+stations.list[thisRoll].stationId+'\');">launch heineken '+stations.list[thisRoll].stationName+' radio</a>').addClass('animate1');

			$('#spinAgain').addClass('animate1');

			$('.bg').addClass('fade');
			$('.bg').eq(thisRoll).addClass('stay');
			$('#spinner').removeClass('nowSpinning');

		},3800);

}


</script>



</head>
<body>
	<div id="stage">

		<div id="spinAgain">spin again?</div>

		<div id="title"></div>
		<div id="tapToSpin"></div>

		<div id="spinner">
			<div class="needle"></div>
			<div class="needleBlur"></div>
		</div>

		<div id="star"></div>
		<div id="launch"></div>
		<div id="bg">
			<div class="bg" id="bg1"></div>
			<div class="bg" id="bg2"></div>
			<div class="bg" id="bg3"></div>
		</div>

	</div>
</body>
</html>
